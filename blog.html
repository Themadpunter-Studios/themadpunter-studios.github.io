---
layout: default
title: blog
---

<h1>logbook</h1>
{% for post in site.posts %}
  <div class="post">
    <p><a href="{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%B %d, %Y" }}</p>
  </div>
{% endfor %}
<p><small>want to view the news as an RSS feed? <a href="{{ site.url }}/feed.xml">Click here</a></small></p>
